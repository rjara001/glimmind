name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # Usando la misma versión mayor que en tu package.json
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        # Forzamos 'run' para que vitest se ejecute una sola vez y devuelva exit code en lugar de quedarse en watch mode
        run: npx vitest run
